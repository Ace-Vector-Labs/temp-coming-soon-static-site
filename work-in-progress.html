<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | Ace Vector Labs</title>
  <meta name="description" content="Website currently under construction." />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="google-site-verification" content="ADD_YOUR_GOOGLE_SEARCH_CONSOLE_TOKEN" />

  <meta property="og:title" content="Coming Soon | Ace Vector Labs" />
  <meta property="og:description" content="Website currently under construction." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <style>
    :root {
      --bg-1: #07111d;
      --bg-2: #0d1b2d;
      --bg-3: #17324d;
      --card: rgba(8, 16, 28, 0.72);
      --text-main: #f5f7fb;
      --text-muted: #c7d0de;
      --accent-1: #69d2ff;
      --accent-2: #f7b267;
      --accent-3: #f3f6ff;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      position: relative;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--text-main);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 14% 20%, rgba(105, 210, 255, 0.18), transparent 38%),
        radial-gradient(circle at 84% 10%, rgba(247, 178, 103, 0.18), transparent 36%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(28px);
      opacity: 0.6;
      mix-blend-mode: screen;
    }

    .blob-1 {
      width: min(48vw, 560px);
      height: min(48vw, 560px);
      background: radial-gradient(circle at 25% 25%, rgba(105, 210, 255, 0.72), rgba(105, 210, 255, 0));
      top: -10%;
      left: -12%;
      animation: float-1 12s ease-in-out infinite;
    }

    .blob-2 {
      width: min(50vw, 620px);
      height: min(50vw, 620px);
      background: radial-gradient(circle at 65% 30%, rgba(247, 178, 103, 0.68), rgba(247, 178, 103, 0));
      right: -16%;
      bottom: -25%;
      animation: float-2 14s ease-in-out infinite;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 25%, transparent 80%);
      opacity: 0.2;
      animation: grid-slide 18s linear infinite;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 760px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: clamp(1.5rem, 4vw, 3rem);
      text-align: center;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow:
        0 16px 42px rgba(0, 0, 0, 0.38),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      animation: card-rise 900ms ease-out both;
    }

    .brand {
      display: block;
      width: clamp(64px, 8vw, 78px);
      margin-bottom: 1rem;
      margin-left: auto;
      margin-right: auto;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .brand img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    h1 {
      margin: 0;
      line-height: 0.95;
      font-family: "Syne", sans-serif;
      font-size: clamp(2rem, 7vw, 5rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-3), var(--accent-2), var(--accent-1));
      background-size: 260% 260%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 7s linear infinite;
      text-shadow: 0 4px 18px rgba(105, 210, 255, 0.16);
    }

    .tagline {
      margin: 1rem auto 0;
      max-width: 50ch;
      color: var(--text-muted);
      font-size: clamp(0.95rem, 2.3vw, 1.15rem);
      line-height: 1.6;
    }

    .links {
      margin-top: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.58rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .pill:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .copyright {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: rgba(215, 223, 218, 0.8);
      letter-spacing: 0.04em;
    }

    @keyframes float-1 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(12%, 8%, 0) scale(1.12); }
      100% { transform: translate3d(4%, -4%, 0) scale(0.96); }
    }

    @keyframes float-2 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(-8%, -12%, 0) scale(1.08); }
      100% { transform: translate3d(6%, -2%, 0) scale(0.94); }
    }

    @keyframes grid-slide {
      0% { transform: translateY(0); }
      100% { transform: translateY(42px); }
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .card {
        border-radius: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <div class="grid"></div>
  </div>

  <main class="card">
    <div class="brand" aria-label="Ace Vector Labs logo">
      <img src="Logo.svg" alt="Ace Vector Labs logo" />
    </div>
    <h1>Work In Progress</h1>
    <p class="tagline">
      Coming Soon!
    </p>

    <div class="links">
      <a class="pill" href="mailto:contact@acevectorlabs.com">Email</a>
      <a class="pill" href="https://in.linkedin.com/company/ace-vector-labs" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="pill" href="https://github.com/Ace-Vector-Labs" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>

    <p class="copyright">© <span id="year"></span> Ace Vector Labs. All rights reserved.</p>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  
</body>
</html>
